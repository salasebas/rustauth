snippet_policy:
  rules:
    - Copy Rust from examples/backend-reference or crate README; cargo fmt snippets
    - "Map BETTER_AUTH_* env vars to RUSTAUTH_SECRET and RUSTAUTH_BASE_URL"
    - Never show createAuthClient or React hooks in migrated pages
    - "HTTP API docs: use curl or examples/backend-reference/src/client/flows.rs"
    - Migrated page descriptions must say RustAuth
    - "under_development pages must include <UnderDevelopment /> at top"

[package]
name = "rustauth-redis"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/rustauth-redis"
readme = "README.md"
description = "Redis integrations for RustAuth."
keywords.workspace = true
categories.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
rustauth-core.workspace = true
redis = { version = "0.32", default-features = false, features = ["tokio-comp", "connection-manager", "script"] }
tokio.workspace = true

[dev-dependencies]
time = { workspace = true }
rustauth-core = { workspace = true, features = ["test-utils"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }

[features]
default = []
native-tls = ["redis/tokio-native-tls-comp"]
rustls = ["redis/tokio-rustls-comp"]

[lints]
workspace = true

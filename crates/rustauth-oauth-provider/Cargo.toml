[package]
name = "rustauth-oauth-provider"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/rustauth-oauth-provider"
readme = "README.md"
description = "OAuth 2.1 and OpenID Connect provider support for RustAuth."
keywords.workspace = true
categories.workspace = true

[lib]
path = "src/lib.rs"

[features]
default = []
mcp-client = ["dep:reqwest"]

name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - release/0.2.0
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: rustup show

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: rustup show

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  semver:
    name: Semver
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      # rustauth-* baselines on crates.io land in plan 007; until then this job
      # compares against placeholder/legacy publishes and may need release-type tweaks.
      - name: Check semver (published API crates)
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: rustauth,rustauth-core,rustauth-oauth,rustauth-plugins,rustauth-sqlx,rustauth-diesel
          release-type: major

  test-crate:
    name: Test ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: rustauth
            nextest_args: --all-features
          - package: rustauth-core
            nextest_args: --all-features
          - package: rustauth-oauth
            nextest_args: --all-features
          - package: rustauth-social-providers
            nextest_args: --all-features
          - package: rustauth-passkey
            nextest_args: --all-features
            doc_tests: true
          - package: rustauth-sqlx
            nextest_args: --features sqlite
          - package: rustauth-plugins
            nextest_args: --all-features
          - package: rustauth-sso
            nextest_args: --all-features
            doc_tests: true
          - package: rustauth-saml
            nextest_args: --all-features
          - package: rustauth-telemetry
            nextest_args: --all-features
          - package: rustauth-axum
            nextest_args: --all-features
          - package: rustauth-cli
            nextest_args: --all-features
          - package: rustauth-i18n
            nextest_args: --all-features
            doc_tests: true
          - package: rustauth-oauth-provider
            nextest_args: --all-features
          - package: rustauth-stripe
            nextest_args: --all-features

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: rustup show

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Test with nextest
        run: cargo nextest run -p ${{ matrix.package }} ${{ matrix.nextest_args }}

      - name: Test rustauth-telemetry without default features
        if: matrix.package == 'rustauth-telemetry'
        run: cargo check -p rustauth-telemetry && cargo nextest run -p rustauth-telemetry

      - name: Test doctests
        if: matrix.doc_tests
        run: cargo test -p ${{ matrix.package }} --doc --all-features

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs:
      - fmt
      - clippy
      - semver
      - test-crate
    if: always()
    steps:
      - name: Check required jobs
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}

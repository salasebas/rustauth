name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: rustup show

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: rustup show

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test-crate:
    name: Test ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: openauth
            services: postgres mysql
          - package: openauth-core
            services: ""
          - package: openauth-oauth
            services: ""
          - package: openauth-social-providers
            services: ""
          - package: openauth-deadpool-postgres
            services: postgres
          - package: openauth-tokio-postgres
            services: postgres
          - package: openauth-passkey
            services: ""
            doc_tests: true
          - package: openauth-sqlx
            services: postgres mysql
          - package: openauth-plugins
            services: ""
          - package: openauth-sso
            services: ""
            doc_tests: true
          - package: openauth-telemetry
            services: ""
          - package: openauth-axum
            services: ""
          - package: openauth-cli
            services: ""
          - package: openauth-i18n
            services: ""
            doc_tests: true
          - package: openauth-oauth-provider
            services: ""
          - package: openauth-fred
            services: redis valkey
          - package: openauth-redis
            services: redis valkey
          - package: openauth-scim
            services: postgres mysql
            doc_tests: true
          - package: openauth-stripe
            services: ""
          - package: openauth-example-full-app
            services: redis valkey

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: rustup show

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Start database services
        if: matrix.services != ''
        run: ./scripts/ensure-test-services.sh ${{ matrix.services }}

      - name: Test with nextest
        run: cargo nextest run -p ${{ matrix.package }} --all-features

      - name: Test openauth-telemetry default features
        if: matrix.package == 'openauth-telemetry'
        run: cargo nextest run -p openauth-telemetry

      - name: Test doctests
        if: matrix.doc_tests
        run: cargo test -p ${{ matrix.package }} --doc --all-features

      - name: Stop database services
        if: always() && matrix.services != ''
        run: docker compose down -v

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs:
      - fmt
      - clippy
      - test-crate
    if: always()
    steps:
      - name: Check required jobs
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}

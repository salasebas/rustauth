name: Integration

on:
  pull_request:
  push:
    branches:
      - main
      - release/0.2.0
  merge_group:
  workflow_dispatch:
  workflow_dispatch:

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTAUTH_TEST_POSTGRES_URL: postgres://user:password@localhost:5432/rustauth
  RUSTAUTH_TEST_MYSQL_URL: mysql://user:password@localhost:3306/rustauth

jobs:
  example-migrations:
    name: Example migrations (backend-reference)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: postgres://user:password@localhost:5432/rustauth
      RUSTAUTH_SECRET: RustAuthSecretForCiMigrate-1234567890!
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: rustup show

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Start Postgres
        run: ./scripts/ensure-test-services.sh postgres

      - name: Apply backend-reference migrations
        run: ./scripts/ensure-example-migrations.sh

      - name: Stop integration services
        if: always()
        run: docker compose down -v

  test-integration:
    name: Test ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: rustauth-plugins
            services: postgres mysql redis valkey
            nextest_args: --all-features --run-ignored only
          - package: rustauth-passkey
            services: postgres mysql
            nextest_args: --all-features --run-ignored only
          - package: rustauth-cli
            services: postgres mysql
            nextest_args: --all-features --run-ignored only
          - package: rustauth
            services: postgres mysql
            nextest_args: --all-features --run-ignored only
          - package: rustauth-sqlx
            services: postgres mysql
            nextest_args: --all-features
          - package: rustauth-diesel
            services: postgres mysql
            nextest_args: --all-features
          - package: rustauth-deadpool-postgres
            services: postgres
            nextest_args: --all-features
          - package: rustauth-tokio-postgres
            services: postgres
            nextest_args: --all-features
          - package: rustauth-scim
            services: postgres mysql
            nextest_args: >-
              --all-features
              --test-threads 1
              -E 'not test(schema_and_provider_store_work_when_configured)'
            doc_tests: true
          - package: rustauth-fred
            services: redis valkey
            nextest_args: --all-features
          - package: rustauth-redis
            services: redis valkey
            nextest_args: --all-features
          - package: rustauth-example-full-app
            services: redis valkey
            nextest_args: --all-features
            working_directory: examples

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: rustup show

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.working_directory || '.' }} -> target

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Start integration services
        run: ./scripts/ensure-test-services.sh ${{ matrix.services }}

      - name: Test with nextest
        working-directory: ${{ matrix.working_directory || '.' }}
        run: cargo nextest run -p ${{ matrix.package }} ${{ matrix.nextest_args }}

      - name: Test doctests
        if: matrix.doc_tests
        working-directory: ${{ matrix.working_directory || '.' }}
        run: cargo test -p ${{ matrix.package }} --doc --all-features

      - name: Stop integration services
        if: always()
        run: docker compose down -v

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs:
      - example-migrations
      - test-integration
    if: always()
    steps:
      - name: Check required jobs
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}

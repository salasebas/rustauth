name: Integration

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  OPENAUTH_TEST_POSTGRES_URL: postgres://user:password@localhost:5432/openauth
  OPENAUTH_TEST_MYSQL_URL: mysql://user:password@localhost:3306/openauth

jobs:
  test-integration:
    name: Test ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: openauth-plugins
            services: postgres mysql redis valkey
            nextest_args: --all-features --run-ignored only
          - package: openauth-passkey
            services: postgres mysql
            nextest_args: --all-features --run-ignored only
          - package: openauth-cli
            services: postgres mysql
            nextest_args: --all-features --run-ignored only
          - package: openauth
            services: postgres mysql
            nextest_args: --all-features --run-ignored only
          - package: openauth-sqlx
            services: postgres mysql
            nextest_args: --all-features
          - package: openauth-deadpool-postgres
            services: postgres
            nextest_args: --all-features
          - package: openauth-tokio-postgres
            services: postgres
            nextest_args: --all-features
          - package: openauth-scim
            services: postgres mysql
            # Shared docker DB: run serially and skip duplicate create_schema smokes
            # (sqlite_schema_and_provider_store_work covers the provider contract).
            nextest_args: >-
              --all-features
              --test-threads 1
              -E 'not test(schema_and_provider_store_work_when_configured)'
            doc_tests: true
          - package: openauth-fred
            services: redis valkey
            nextest_args: --all-features
          - package: openauth-redis
            services: redis valkey
            nextest_args: --all-features
          - package: openauth-example-full-app
            services: redis valkey
            nextest_args: --all-features

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        run: rustup show

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Start integration services
        run: ./scripts/ensure-test-services.sh ${{ matrix.services }}

      - name: Test with nextest
        run: cargo nextest run -p ${{ matrix.package }} ${{ matrix.nextest_args }}

      - name: Test doctests
        if: matrix.doc_tests
        run: cargo test -p ${{ matrix.package }} --doc --all-features

      - name: Stop integration services
        if: always()
        run: docker compose down -v

  integration:
    name: Integration
    runs-on: ubuntu-latest
    needs:
      - test-integration
    if: always()
    steps:
      - name: Check required jobs
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
